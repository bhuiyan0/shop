services:
  db:
    image: postgres:16-alpine
    container_name: bdshop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bdshop
      POSTGRES_PASSWORD: bdshop
      POSTGRES_DB: bdshop
    ports:
      - "5432:5432"
    volumes:
      - bdshop_pgdata:/var/lib/postgresql/data

volumes:
  bdshop_pgdata:
